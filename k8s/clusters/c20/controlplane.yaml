---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
kind: TalosControlPlane
metadata:
  name: c20-cp
spec:
  version: v1.36.2
  replicas: 3
  controlPlaneConfig:
    controlplane:
      generateType: controlplane
      strategicPatches:
        - |
          ---
          # primary interface alias
          apiVersion: v1alpha1
          kind: LinkAliasConfig
          name: net0
          selector:
            match: true
          ---
          # time config
          apiVersion: v1alpha1
          kind: TimeSyncConfig
          ptp:
            devices: [/dev/ptp0]
        - |
          # disk config
          ---
          apiVersion: v1alpha1
          kind: VolumeConfig
          name: STATE
          encryption:
            provider: luks2
            keys:
              - slot: 0
                tpm: {}
          ---
          apiVersion: v1alpha1
          kind: VolumeConfig
          name: EPHEMERAL
          encryption:
            provider: luks2
            keys:
              - slot: 0
                tpm: {}
                lockToState: true
        - |
          # zfs disk config
          machine:
            kernel:
              modules:
                - name: zfs
        - |
          # cluster-api compat
          machine:
            kubelet:
              extraArgs:
                cloud-provider: external
                rotate-server-certificates: true
            features:
              kubernetesTalosAPIAccess:
                enabled: true
                allowedRoles:
                  - os:reader
                allowedKubernetesNamespaces:
                  - kube-system
        - |
          # disable features
          cluster:
            network:
              cni:
                name: none
              podSubnets:
                - 10.32.16.0/20
                - fdbc:ba6a:38de:32:1::/80
              serviceSubnets:
                - 10.96.0.0/12
                - fdbc:ba6a:38de:6000::/108
            proxy:
              disabled: true
            coreDNS:
              disabled: true
            discovery:
              enabled: false
            controllerManager:
              extraArgs:
                node-cidr-mask-size-ipv4: 24
                node-cidr-mask-size-ipv6: 96
            apiServer:
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
          machine:
            features:
              hostDNS:
                enabled: true
                forwardKubeDNSToHost: false
              kubePrism:
                enabled: true
                port: 7445
      talosVersion: v1.13.5
  infrastructureTemplate:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
    kind: ProxmoxMachineTemplate
    name: c20-cp-a
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
kind: ProxmoxMachineTemplate
metadata:
  name: c20-cp-a
spec:
  template:
    spec:
      checks:
        skipCloudInitStatus: true
      memoryMiB: 4096
      disks:
        bootVolume:
          disk: virtio0
          sizeGb: 20
      network:
        networkDevices:
          - bridge: vmbr0
            model: virtio
            vlan: 30
        zone: cp
      sourceNode: pve01
      templateID: 201
      vmIDRange:
        start: 300
        end: 399
      metadataSettings:
        providerIDInjection: true
