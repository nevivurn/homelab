cleanupJob:
  enabled: false

collectors:
  daemon:
    scrape_configs_file: ""
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    config:
      extensions:
        health_check: {}
      receivers:
        kubeletstats:
          collection_interval: 10s
        prometheus/cadvisor:
          config:
            scrape_configs:
              - job_name: cadvisor
                scrape_interval: 10s
                scheme: https
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                static_configs:
                  - targets:
                      - "${env:OTEL_K8S_NODE_IP}:10250"
                metrics_path: /metrics/cadvisor
                metric_relabel_configs:
                  - source_labels: [__name__]
                    regex: 'container_cpu_cfs_(throttled_periods|periods|throttled_seconds)_total'
                    action: keep
                  - source_labels: [namespace]
                    target_label: k8s_namespace_name
                  - source_labels: [pod]
                    target_label: k8s_pod_name
                  - source_labels: [container]
                    target_label: k8s_container_name
                  - action: labelkeep
                    regex: '__name__|k8s_(namespace|pod|container)_name'
      processors:
        memory_limiter:
          check_interval: 1s
          limit_percentage: 80
          spike_limit_percentage: 20
        resource/cluster:
          attributes:
            - key: k8s.cluster.name
              value: unknown
              action: upsert
      exporters:
        otlphttp/logs:
          endpoint: https://otlp.k8s.nevi.network/logs
        otlphttp/metrics:
          endpoint: https://otlp.k8s.nevi.network/metrics
        otlp/traces:
          endpoint: otlp.k8s.nevi.network:443
      service:
        extensions:
          - health_check
        pipelines:
          traces:
            receivers:
              - otlp
            processors:
              - memory_limiter
              - k8sattributes
              - resourcedetection/env
              - resource/hostname
              - resource/cluster
              - batch
            exporters:
              - otlp/traces
          metrics:
            receivers:
              - otlp
              - prometheus/cadvisor
            processors:
              - memory_limiter
              - k8sattributes
              - resourcedetection/env
              - resource/hostname
              - resource/cluster
              - batch
            exporters:
              - otlphttp/metrics
          logs:
            receivers:
              - otlp
            processors:
              - memory_limiter
              - k8sattributes
              - resourcedetection/env
              - resource/hostname
              - resource/cluster
              - batch
            exporters:
              - otlphttp/logs
