crds:
  installPrometheus: false

cleanupJob:
  enabled: false

collectors:
  daemon:
    scrape_configs_file: ""
    presets:
      logsCollection:
        includeCollectorLogs: false
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    config:
      exporters:
        otlp:
          endpoint: otlp.c20.k8s.nevi.network:4317
          tls:
            insecure: true
      processors:
        resource/cluster:
          attributes:
            - key: k8s.cluster.name
              value: unknown
              action: upsert
      service:
        pipelines:
          traces:
            receivers:
              - otlp
            processors:
              - resourcedetection/env
              - resource/hostname
              - resource/cluster
              - batch
            exporters:
              - otlp
          metrics:
            receivers:
              - otlp
            processors:
              - resourcedetection/env
              - resource/hostname
              - resource/cluster
              - batch
            exporters:
              - otlp
          logs:
            receivers:
              - otlp
            processors:
              - resourcedetection/env
              - resource/hostname
              - resource/cluster
              - batch
            exporters:
              - otlp
