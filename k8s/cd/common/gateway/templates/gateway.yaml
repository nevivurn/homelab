---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  namespace: {{ .Release.Namespace }}
  name: gateway
spec:
  mergeGateways: true
  ipFamily: DualStack
  telemetry:
    accessLog:
      settings:
        - sinks:
            - type: OpenTelemetry
              openTelemetry:
                port: 4317
                backendRefs:
                  - group: gateway.envoyproxy.io
                    kind: Backend
                    name: otelcol-local
                    port: 4317
                    weight: 1
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: {{ .Values.replicaCount }}
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 1
        container:
          resources:
            limits:
              cpu: "2"
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 256Mi
        pod:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: envoy
      {{- if .Values.pdb.enabled }}
      envoyPDB:
        minAvailable: {{ .Values.pdb.minAvailable }}
      {{- end }}
      envoyService:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: {{ index .Values.dnsNames 0 | replace "*" "gateway" | quote }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  namespace: {{ .Release.Namespace }}
  name: otelcol-local
spec:
  endpoints:
    - fqdn:
        hostname: opentelemetry-kube-stack-daemon-collector.monitoring.svc.cluster.local
        port: 4317
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    namespace: {{ .Release.Namespace }}
    name: gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  namespace: {{ .Release.Namespace }}
  name: gateway
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: gateway
      allowedRoutes:
        namespaces:
          from: All
    - name: tls
      port: 6443
      protocol: TLS
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  namespace: {{ .Release.Namespace }}
  name: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
  http3: {}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: {{ .Release.Namespace }}
  name: https-redirect
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
      matches:
        - path:
            type: PathPrefix
            value: /
