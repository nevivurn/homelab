---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: external-nodes
  namespace: monitoring
spec:
  staticConfigs:
    - targets:
        - athebyne.inf.nevi.network:9100
        - pve01.mgmt.nevi.network:9100
        - rtr01.k8s.nevi.network:9100
        - rtr02.k8s.nevi.network:9100
  metricsPath: /metrics
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: external-smartctl
  namespace: monitoring
spec:
  staticConfigs:
    - targets:
        - athebyne.inf.nevi.network:9633
        - pve01.mgmt.nevi.network:9633
  metricsPath: /metrics
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: blackbox-icmp
  namespace: monitoring
spec:
  staticConfigs:
    - targets:
        - alrakis.prx.nevi.network
        - giausar.prx.nevi.network
  metricsPath: /probe
  params:
    module:
      - icmp
  relabelings:
    - action: replace
      sourceLabels: [__address__]
      targetLabel: __param_target
    - action: replace
      sourceLabels: [__param_target]
      targetLabel: instance
    - action: replace
      targetLabel: __address__
      replacement: prometheus-blackbox-exporter.monitoring.svc:9115
---
