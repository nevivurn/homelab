service:
  merge:
    metadata:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: nats.k8s.nevi.network
    spec:
      type: LoadBalancer
      externalTrafficPolicy: Local
      ipFamilyPolicy: RequireDualStack
      ipFamilies: [IPv4, IPv6]

config:
  cluster:
    enabled: true
    replicas: 3
    routeURLs:
      useFQDN: true
    tls:
      enabled: true
      secretName: nats-cluster
      merge:
        ca_file: /etc/nats-certs/cluster/ca.crt
        verify_cert_and_check_known_urls: true
  nats:
    tls:
      enabled: true
      secretName: nats-server
  jetstream:
    enabled: true
    fileStore:
      enabled: false
    memoryStore:
      enabled: true
      maxSize: 512Mi
  resolver:
    enabled: true
    pvc:
      storageClassName: openebs-zfs
    merge:
      type: full
      #interval: 2m
      #timeout: 1.9s
  merge:
    operator: eyJ0eXAiOiJKV1QiLCJhbGciOiJlZDI1NTE5LW5rZXkifQ..bfDarX_IzwClzhT6MGQWIs7HNP-hVD5vokH9X3VVtd3nHGMyyrQ5t6-fNJDAHXMvvUmBIFxifgVT2c3Elx8jCA
    system_account: ABXFH6QDZBL6UFDW4GMFTBAR2C6HWV4BHNXBWQXX6KO5NLLUWIOHCVC7
    resolver_preload:
      ABXFH6QDZBL6UFDW4GMFTBAR2C6HWV4BHNXBWQXX6KO5NLLUWIOHCVC7: eyJ0eXAiOiJKV1QiLCJhbGciOiJlZDI1NTE5LW5rZXkifQ..Lxj0cIVSVjWCUzp8YrARq7DHcZ4OwBQVvcXLb7hLk6WMg7tkeDv_WbkGm4OQde4yBIXhfsATx3oIObt9R3ACCQ

container:
  env:
    GOMEMLIMIT: 768MiB
  merge:
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 1Gi

podDisruptionBudget:
  merge:
    spec:
      maxUnavailable: 1

podTemplate:
  merge:
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: nats
                  app.kubernetes.io/instance: nats
                  app.kubernetes.io/name: nats
              topologyKey: kubernetes.io/hostname
