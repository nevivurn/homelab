apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gateway-certs-share-openbao
  namespace: gateway
spec:
  provider:
    kubernetes:
      remoteNamespace: openbao
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: gateway-certs-share
