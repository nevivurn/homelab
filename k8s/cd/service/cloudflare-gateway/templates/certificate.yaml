apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  namespace: {{ .Release.Namespace }}
  name: cloudflare-gateway
spec:
  secretName: cloudflare-gateway
  issuerRef:
    kind: ClusterIssuer
    name: cluster-ca
  dnsNames:
    {{- toYaml .Values.dnsNames | nindent 4 }}
  privateKey:
    algorithm: Ed25519
