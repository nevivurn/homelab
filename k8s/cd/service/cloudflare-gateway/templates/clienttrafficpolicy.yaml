apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  namespace: {{ .Release.Namespace }}
  name: cloudflare-gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cloudflare-gateway
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
  http3: {}
