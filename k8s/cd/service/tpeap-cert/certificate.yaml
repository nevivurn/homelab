apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tpeap-cert
spec:
  secretName: tpeap-cert
  issuerRef:
    kind: ClusterIssuer
    name: le-prod
  dnsNames:
    - tpeap.mgmt.nevi.network
  privateKey:
    algorithm: ECDSA
    size: 256
  keystores:
    jks:
      create: true
      password: tplink
