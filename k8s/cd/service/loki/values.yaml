deploymentMode: Monolithic

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  compactor:
    retention_enabled: true
    delete_request_store: s3
  limits_config:
    allow_structured_metadata: true
    retention_period: 48h
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
    s3:
      endpoint: https://s3.k8s.nevi.network
      accessKeyId: ${AWS_ACCESS_KEY_ID}
      secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true

singleBinary:
  replicas: 1
  persistence:
    storageClass: openebs-zfs
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      memory: 1Gi
  extraEnv:
    - name: GOMEMLIMIT
      value: 768MiB
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: loki-s3
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3
          key: AWS_SECRET_ACCESS_KEY

# Disable microservice components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable built-in gateway
gateway:
  enabled: false

test:
  enabled: false
lokiCanary:
  enabled: false

# Disable caches for simplicity
chunksCache:
  enabled: false
resultsCache:
  enabled: false
