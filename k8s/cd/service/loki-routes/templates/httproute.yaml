apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: gateway
      name: gateway
  hostnames:
    {{- toYaml .Values.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: loki
          port: 3100
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /logs
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /otlp
