apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cluster-db-replication
spec:
  secretName: cluster-db-replication
  secretTemplate:
    labels:
      cnpg.io/reload: ""
  usages:
    - client auth
  commonName: streaming_replica
  privateKey:
    algorithm: ECDSA
    size: 384
  issuerRef:
    name: cluster-db
    kind: ClusterIssuer
