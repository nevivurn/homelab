pod:
  kind: Deployment
  replicas: 2
  securityContext:
    pod:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
  selectors:
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: authelia
                app.kubernetes.io/instance: authelia
            topologyKey: kubernetes.io/hostname

  env:
    - name: AUTHELIA_STORAGE_POSTGRES_TLS_CERTIFICATE_CHAIN_FILE
      value: /certificates/tls.crt
    - name: AUTHELIA_STORAGE_POSTGRES_TLS_PRIVATE_KEY_FILE
      value: /certificates/tls.key

podDisruptionBudget:
  enabled: true
  minAvailable: 1

secret:
  existingSecret: authelia-secret
  additionalSecrets:
    authelia-oidc:
      path: oidc
      items:
        - key: envoy-auth
          path: envoy-auth
        - key: argocd
          path: argocd
    authelia-jwk:
      path: jwk
      items:
        - key: tls.crt
          path: tls.crt
        - key: tls.key
          path: tls.key

certificates:
  existingSecret: cluster-db-authelia

configMap:
  authentication_backend:
    ldap:
      enabled: true
      implementation: lldap
      address: ldap://lldap.lldap.svc:3890
      base_dn: dc=nevi,dc=network
      user: uid=authelia,ou=people,dc=nevi,dc=network

  session:
    cookies:
      - domain: auth.k8s.nevi.network

  storage:
    postgres:
      enabled: true
      address: tcp://cluster-db-rw.cluster-db.svc:5432
      database: authelia
      username: authelia
      password:
        disabled: true
      tls:
        enabled: true
        server_name: cluster-db-rw.cluster-db.svc

  identity_providers:
    oidc:
      enabled: true
      jwks:
        - key_id: rs-01
          algorithm: RS256
          use: sig
          certificate_chain:
            path: /secrets/jwk/tls.crt
          key:
            path: /secrets/jwk/tls.key
      claims_policies:
        id-groups:
          id_token:
            - groups
      clients:
        - client_id: envoy-auth
          client_name: Envoy Auth
          public: false
          client_secret:
            path: /secrets/oidc/envoy-auth
          claims_policy: id-groups
          scopes:
            - openid
            - profile
            - email
            - groups
          redirect_uris:
            - https://seaweedfs.k8s.nevi.network/oauth2/callback
            - https://seaweedfs.c20.k8s.nevi.network/oauth2/callback
          authorization_policy: one_factor
          pre_configured_consent_duration: 1w
        - client_id: argocd
          client_name: ArgoCD
          public: false
          client_secret:
            path: /secrets/oidc/argocd
          claims_policy: id-groups
          scopes:
            - openid
            - profile
            - email
            - groups
          redirect_uris:
            - https://argocd.capi.k8s.nevi.network/auth/callback
          authorization_policy: one_factor
          pre_configured_consent_duration: 1w

  notifier:
    filesystem:
      enabled: true

  ntp:
    address: udp://api.inf.nevi.network:123

  access_control:
    default_policy: one_factor
