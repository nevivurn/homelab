apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: thanos-bucketweb
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: gateway
      name: gateway
  hostnames:
    {{- toYaml .Values.bucketweb.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: thanos-bucketweb
          port: 10902
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
