apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbun
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbun
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbun
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: httpbun
          image: sharat87/httpbun
          ports:
            - name: http
              containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
