ipam:
  mode: kubernetes
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
securityContext:
  capabilities:
    cleanCiliumState: [NET_ADMIN, SYS_ADMIN, SYS_RESOURCE]
    ciliumAgent:
      [
        CHOWN,
        KILL,
        NET_ADMIN,
        NET_RAW,
        IPC_LOCK,
        SYS_ADMIN,
        SYS_RESOURCE,
        DAC_OVERRIDE,
        FOWNER,
        SETGID,
        SETUID,
      ]
k8sServiceHost: localhost
k8sServicePort: 7445

kubeProxyReplacement: true
bpf:
  distributedLRU:
    enabled: true
  datapathMode: netkit
bpfClockProbe: true
enableIPv4Masquerade: false
enableIPv6Masquerade: false

bandwidthManager:
  enabled: true
  bbr: true

ipv4:
  enabled: true
ipv6:
  enabled: true

routingMode: native
autoDirectNodeRoutes: true

loadBalancer:
  mode: dsr
  dsrDispatch: opt

bgpControlPlane:
  enabled: true

hubble:
  enabled: true
  relay:
    enabled: true
  tls:
    auto:
      enabled: true
      method: certmanager
      certManagerIssuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: cluster-ca

operator:
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
    maxUnavailable: null

encryption:
  enabled: true
  type: wireguard
