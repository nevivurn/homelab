---
environments:
  default:
    values:
      - tccm:
          enabled: true
  management:
    values:
      - tccm:
          enabled: false
---
commonLabels:
  bootstrap: "true"

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.18.6
    values:
      - ./cilium/values.yaml.gotmpl
  - name: cilium
    chart: ./cilium-bgp

  - name: talos-cloud-controller-manager
    namespace: kube-system
    chart: oci://ghcr.io/siderolabs/charts/talos-cloud-controller-manager
    version: 0.5.4
    condition: tccm.enabled
    values:
      - ./talos-cloud-controller-manager/values.yaml.gotmpl

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.45.2
    values:
      - ./coredns/values.yaml.gotmpl
